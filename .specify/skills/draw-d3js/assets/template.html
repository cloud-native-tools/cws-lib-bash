<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D3.js Visualization</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #fafafa;
      padding: 20px;
    }
    #chart {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      width: 100%;
      max-width: 900px;
    }
    .chart-title {
      font-size: 18px;
      font-weight: 600;
      text-anchor: middle;
      fill: #333;
    }
    .axis text { font-size: 12px; fill: #666; }
    .axis line, .axis path { stroke: #ddd; }
    .tooltip {
      position: absolute;
      visibility: hidden;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="chart"></div>
  <div class="tooltip"></div>
  <script>
    // ============================================================
    // Configuration
    // ============================================================
    const margin = { top: 40, right: 30, bottom: 50, left: 60 };
    const width = 800 - margin.left - margin.right;
    const height = 500 - margin.top - margin.bottom;

    // ============================================================
    // Data (replace with your data)
    // ============================================================
    const data = [
      { name: "Category A", value: 30 },
      { name: "Category B", value: 86 },
      { name: "Category C", value: 45 },
      { name: "Category D", value: 72 },
      { name: "Category E", value: 58 }
    ];

    // ============================================================
    // SVG Setup
    // ============================================================
    const svg = d3.select("#chart")
      .append("svg")
        .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
        .attr("preserveAspectRatio", "xMidYMid meet")
        .style("width", "100%")
        .style("height", "auto")
      .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    // ============================================================
    // Scales
    // ============================================================
    const xScale = d3.scaleBand()
      .domain(data.map(d => d.name))
      .range([0, width])
      .padding(0.2);

    const yScale = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.value)])
      .range([height, 0])
      .nice();

    const colorScale = d3.scaleOrdinal(d3.schemeTableau10);

    // ============================================================
    // Axes
    // ============================================================
    svg.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${height})`)
      .call(d3.axisBottom(xScale));

    svg.append("g")
      .attr("class", "axis")
      .call(d3.axisLeft(yScale).ticks(5));

    // ============================================================
    // Chart Title
    // ============================================================
    svg.append("text")
      .attr("class", "chart-title")
      .attr("x", width / 2)
      .attr("y", -15)
      .text("Chart Title");

    // ============================================================
    // Draw Elements (replace with your chart logic)
    // ============================================================
    // TODO: Replace with actual visualization code

    // ============================================================
    // Tooltip (optional)
    // ============================================================
    const tooltip = d3.select(".tooltip");
  </script>
</body>
</html>
